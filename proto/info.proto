syntax = "proto3";

package info;

// InfoService — on-demand system metrics queries.
service InfoService {
  // Full system overview (OS, uptime, CPU brand, core count).
  rpc SystemInfo(SystemInfoRequest) returns (SystemInfoResponse);
  // Current CPU usage and load averages.
  rpc CpuUsage(CpuUsageRequest) returns (CpuUsageResponse);
  // Current RAM and swap usage.
  rpc MemoryInfo(MemoryInfoRequest) returns (MemoryInfoResponse);
  // Disk partition list with usage.
  rpc DiskInfo(DiskInfoRequest) returns (DiskInfoResponse);
  // Service liveness check.
  rpc Health(HealthRequest) returns (HealthResponse);
}

// ── Requests ──────────────────────────────────────────────────────────────────

message SystemInfoRequest {}
message CpuUsageRequest {}
message MemoryInfoRequest {}
message DiskInfoRequest {}
message HealthRequest {}

// ── Responses ─────────────────────────────────────────────────────────────────

message SystemInfoResponse {
  string hostname     = 1;
  string os_type      = 2;
  string os_version   = 3;
  string kernel       = 4;
  string arch         = 5;
  uint64 uptime_secs  = 6;
  string cpu_brand    = 7;
  uint32 core_count   = 8;
}

message LoadAverageProto {
  double one     = 1;
  double five    = 2;
  double fifteen = 3;
}

message CpuUsageResponse {
  float            usage_percent    = 1;
  uint32           core_count       = 2;
  repeated float   per_core_percent = 3;
  LoadAverageProto load_average     = 4;
  string           brand            = 5;
}

message MemoryInfoResponse {
  uint64 total_bytes      = 1;
  uint64 used_bytes       = 2;
  uint64 available_bytes  = 3;
  double used_percent     = 4;
  uint64 swap_total_bytes = 5;
  uint64 swap_used_bytes  = 6;
}

message PartitionProto {
  string name            = 1;
  string mount_point     = 2;
  uint64 total_bytes     = 3;
  uint64 used_bytes      = 4;
  uint64 available_bytes = 5;
  double used_percent    = 6;
}

message DiskInfoResponse {
  repeated PartitionProto partitions = 1;
}

message HealthResponse {
  bool   ok      = 1;
  string version = 2;
}
